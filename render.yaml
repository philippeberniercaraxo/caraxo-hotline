services:
  - type: web
    name: caraxo-hotline
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/caraxo.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
